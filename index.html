<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syntra AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .chat-header {
      background: #111827;
      color: white;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
    }
    .chat-box {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
    }
    .message {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      max-width: 75%;
      white-space: pre-wrap;
    }
    .user {
      background: #dbeafe;
      margin-left: auto;
    }
    .bot {
      background: #e5e7eb;
      margin-right: auto;
    }
    .chat-input {
      display: flex;
      padding: 16px;
      gap: 10px;
      border-top: 1px solid #eee;
      background: white;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Syntra AI Demo</div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">Merhaba, hoş geldiniz 🙂 Syntra hakkında istediğiniz şeyi sorabilirsiniz.</div>
    </div>
    <div class="chat-input">
      <input id="messageInput" placeholder="Mesaj yaz..." />
      <button onclick="sendMessage()">Gönder</button>
    </div>
  </div>

  <script>
    const userId = "demo-user";

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatBox = document.getElementById("chatBox");
      const message = input.value.trim();

      if (!message) return;

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.innerText = message;
      chatBox.appendChild(userDiv);

      input.value = "";

      const botDiv = document.createElement("div");
      botDiv.className = "message bot";
      botDiv.innerText = "Yazıyor...";
      chatBox.appendChild(botDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId,
            message
          })
        });

        const data = await res.json();
        botDiv.innerText = data.reply || "Bir hata oluştu.";
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (err) {
        botDiv.innerText = "Bağlantı hatası oluştu.";
      }
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
